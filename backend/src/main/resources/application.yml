spring:
  application:
    name: splitwise-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

rate-limit:
  tiers:
    free:
      general: 60
      write: 20
    pro:
      general: 300
      write: 120

app:
  cors:
    allowed-origins:
      - https://getsplenza.in
      - https://www.getsplenza.in
